<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PickOne · 픽원</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      background: #fff;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; animation: none !important; transform: none !important; }

    /* ── SPLASH ── */
    #screen-splash {
      align-items: center;
      justify-content: center;
      gap: 0;
      background: #fff;
    }

    .splash-logo {
      width: 110px;
      height: 110px;
      border-radius: 28px;
      margin-bottom: 28px;
      object-fit: cover;
    }

    .splash-title {
      font-size: 17px;
      color: #1a1a1a;
      font-weight: 400;
      margin-bottom: 100px;
    }

    .btn-start {
      width: calc(100% - 48px);
      padding: 18px;
      border-radius: 14px;
      border: none;
      background: #5B4EFF;
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      position: absolute;
      bottom: 48px;
      left: 24px;
    }

    .btn-start:active { transform: scale(0.98); opacity: 0.9; }

    /* ── INPUT ── */
    #screen-input { background: #fff; padding: 0 0 120px; }

    .input-header {
      padding: 60px 24px 16px;
      text-align: center;
    }

    .input-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .section-label {
      font-size: 13px;
      color: #888;
      font-weight: 400;
      padding: 0 24px;
      margin-bottom: 10px;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 24px;
      margin-bottom: 0;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.2s ease;
    }

    .input-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      height: 38px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .item-num {
      font-size: 15px;
      color: #aaa;
      width: 18px;
      flex-shrink: 0;
      text-align: center;
      font-weight: 400;
    }

    .item-input {
      width: 100%;
      height: 38px;
      background: #f0f0f0;
      border: none;
      border-radius: 8px;
      padding: 9px 36px 9px 12px;
      color: #1a1a1a;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      outline: none;
      transition: background 0.2s;
      box-sizing: border-box;
    }

    .item-input:focus { background: #e8e8e8; }
    .item-input::placeholder { color: #aaa; font-size: 14px; }

    .btn-delete {
      position: absolute;
      right: 8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      padding: 0;
    }

    .btn-delete svg {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }

    .btn-delete:active { opacity: 0.5; }

    .btn-add {
      width: 40px;
      height: 40px;
      padding: 3px;
      border-radius: 50%;
      border: none;
      background: #e8e8e8;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 16px auto 0;
      gap: 10px;
    }

    .btn-add svg {
      width: 18px;
      height: 18px;
      fill: #000;
      flex-shrink: 0;
    }

    .btn-add:active { opacity: 0.7; transform: scale(0.95); }

    .btn-pick {
      width: calc(100% - 48px);
      padding: 19px;
      border-radius: 16px;
      border: none;
      background: #5B4EFF;
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 342px;
      box-shadow: 0 4px 20px rgba(91,78,255,0.35);
    }

    .btn-pick:not(:disabled):active { transform: translateX(-50%); opacity: 0.9; }

    .btn-pick:disabled { background: #ddd; color: #bbb; cursor: not-allowed; }
    .btn-pick:not(:disabled):active { transform: scale(0.98); }

    /* ── LOADING ── */
    #screen-loading {
      background: #fff;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      padding: 24px;
    }

    .loading-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .loading-sub {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 60px;
    }

    .thinking-emoji {
      font-size: 100px;
      animation: float 1.2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    /* ── RESULT ── */
    #screen-result {
      background: #fff;
      padding: 24px;
    }

    .result-header {
      padding-top: 56px;
      margin-bottom: 32px;
    }

    .result-header p {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.4;
    }

    .result-card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 48px 24px;
      text-align: center;
      margin-bottom: 32px;
      opacity: 0;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .result-emoji { font-size: 56px; margin-bottom: 20px; display: block; }

    .result-text {
      font-size: 36px;
      font-weight: 700;
      color: #FFD700;
      word-break: keep-all;
      line-height: 1.2;
    }

    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.4s ease 0.5s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-kakao {
      width: 100%;
      padding: 17px;
      border-radius: 12px;
      border: none;
      background: #FEE500;
      color: #3A1D1D;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-kakao:active { opacity: 0.85; }

    .btn-retry {
      width: 100%;
      padding: 17px;
      border-radius: 12px;
      border: none;
      background: #f0f0f0;
      color: #1a1a1a;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-retry:active { background: #e5e5e5; }

    .btn-reset {
      width: 100%;
      padding: 17px;
      border-radius: 12px;
      border: none;
      background: #f0f0f0;
      color: #1a1a1a;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-reset:active { background: #e5e5e5; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 14px;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

    <button class="btn-start" id="btn-start">시작하기</button>
  </div>

  <!-- INPUT -->
  <div id="screen-input" class="screen">
    <div class="input-header">
      <h1>Pick one</h1>
    </div>
    <div class="section-label">항목 입력</div>
    <div class="items-list" id="items-list"></div>
    <button class="btn-add" id="btn-add"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.2875 20.7125C11.0958 20.5208 11 20.2833 11 20V13H4C3.71667 13 3.47917 12.9042 3.2875 12.7125C3.09583 12.5208 3 12.2833 3 12C3 11.7167 3.09583 11.4792 3.2875 11.2875C3.47917 11.0958 3.71667 11 4 11H11V4C11 3.71667 11.0958 3.47917 11.2875 3.2875C11.4792 3.09583 11.7167 3 12 3C12.2833 3 12.5208 3.09583 12.7125 3.2875C12.9042 3.47917 13 3.71667 13 4V11H20C20.2833 11 20.5208 11.0958 20.7125 11.2875C20.9042 11.4792 21 11.7167 21 12C21 12.2833 20.9042 12.5208 20.7125 12.7125C20.5208 12.9042 20.2833 13 20 13H13V20C13 20.2833 12.9042 20.5208 12.7125 20.7125C12.5208 20.9042 12.2833 21 12 21C11.7167 21 11.4792 20.9042 11.2875 20.7125Z" fill="black"/></svg></button>
    <button class="btn-pick" id="btn-pick" disabled>픽원 시작!</button>
  </div>

  <!-- LOADING -->
  <div id="screen-loading" class="screen">
    <div class="loading-title">pickone 이 열심히 고르고 있어요</div>
    <div class="loading-sub">잠시만 기다려주세요...</div>
    <div class="thinking-emoji">🤔</div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <p>pickone이 오늘 고른 선택입니다.</p>
    </div>
    <div class="result-card">
      <span class="result-emoji" id="result-emoji">🎯</span>
      <div class="result-text" id="result-text"></div>
    </div>
    <div class="result-actions">
      <button class="btn-kakao" id="btn-share">카카오톡으로 결과 공유하기</button>
      <button class="btn-retry" id="btn-retry">다시 뽑기</button>
      <button class="btn-reset" id="btn-reset">처음부터</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let items = ['', '', ''];
  let pickedResult = '';
  const emojis = ['🎯','🎲','🌟','⚡','🔥','💫','🎪','✨','🍀','🎁','👆','🙌'];

  function renderItems() {
    const list = document.getElementById('items-list');
    list.innerHTML = '';
    items.forEach((val, i) => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        <span class="item-num">${i + 1}</span>
        <div class="input-wrap">
          <input class="item-input" type="text" placeholder="고민 중인 항목을 입력해주세요." value="${val}" data-index="${i}" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <button class="btn-delete" data-index="${i}"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 1L1 11M1 1L11 11" stroke="#1E1E1E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
      `;
      list.appendChild(row);
    });

    list.querySelectorAll('.item-input').forEach(input => {
      input.addEventListener('input', e => {
        items[+e.target.dataset.index] = e.target.value;
        updatePickBtn();
      });
    });

    list.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', e => {
        if (items.length <= 2) { showToast('최소 2개는 있어야 해요!'); return; }
        items.splice(+e.currentTarget.dataset.index, 1);
        renderItems();
      });
    });

    updatePickBtn();
  }

  function updatePickBtn() {
    const filled = items.filter(v => v.trim()).length;
    document.getElementById('btn-pick').disabled = filled < 2;
  }

  document.getElementById('btn-start').addEventListener('click', () => {
    showScreen('screen-input');
  });

  document.getElementById('btn-add').addEventListener('click', () => {
    if (items.length >= 10) { showToast('최대 10개까지 가능해요!'); return; }
    items.push('');
    renderItems();
    setTimeout(() => {
      const inputs = document.querySelectorAll('.item-input');
      inputs[inputs.length - 1].focus();
    }, 50);
  });

  document.getElementById('btn-pick').addEventListener('click', () => {
    const filled = items.filter(v => v.trim());
    if (filled.length < 2) return;
    showScreen('screen-loading');
    setTimeout(() => {
      pickedResult = filled[Math.floor(Math.random() * filled.length)];
      document.getElementById('result-text').textContent = pickedResult;
      document.getElementById('result-emoji').textContent = emojis[Math.floor(Math.random() * emojis.length)];
      showScreen('screen-result');
    }, 2200);
  });

  document.getElementById('btn-retry').addEventListener('click', () => {
    const filled = items.filter(v => v.trim());
    showScreen('screen-loading');
    setTimeout(() => {
      pickedResult = filled[Math.floor(Math.random() * filled.length)];
      document.getElementById('result-text').textContent = pickedResult;
      document.getElementById('result-emoji').textContent = emojis[Math.floor(Math.random() * emojis.length)];
      showScreen('screen-result');
    }, 2200);
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    items = ['', '', ''];
    renderItems();
    showScreen('screen-input');
  });

  document.getElementById('btn-share').addEventListener('click', () => {
    const text = `🎯 PickOne(픽원)이 골라줬어요!\n\n오늘의 선택 → "${pickedResult}"\n\n나도 해보기 👉 https://pickone.kr`;
    if (navigator.share) {
      navigator.share({ text });
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => showToast('📋 공유 내용이 복사됐어요!'));
    }
  });

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  renderItems();
</script>
</body>
</html>
